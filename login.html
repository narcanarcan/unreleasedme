<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sign in to Unreleased.me." />
    <title>Sign in | unreleased.me</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="form-panel">
        <div class="form-wrap">
          <a class="form-brand" href="index.html" aria-label="Unreleased.me home">
            <img src="assets/unreleased-logo.png" alt="Unreleased.me" />
          </a>

          <div class="form-heading">
            <p class="form-heading__kicker">Welcome back</p>
            <h1>Sign in to your account</h1>
            <p>Enter your details to continue.</p>
          </div>

          <form id="login-form" novalidate>
            <div class="field">
              <label for="email">Email address</label>
              <div class="input-wrap">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 6h16v12H4zM4 7l8 6 8-6" />
                </svg>
                <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
              </div>
              <span class="field-error" id="email-error">Enter a valid email address.</span>
            </div>

            <div class="field">
              <div class="label-row">
                <label for="password">Password</label>
                <a href="#">Forgot password?</a>
              </div>
              <div class="input-wrap">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="5" y="10" width="14" height="10" rx="2" />
                  <path d="M8 10V7a4 4 0 0 1 8 0v3" />
                </svg>
                <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" minlength="8" required />
                <button class="password-toggle" type="button" aria-label="Show password" aria-pressed="false">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" />
                    <circle cx="12" cy="12" r="2.5" />
                  </svg>
                </button>
              </div>
              <span class="field-error" id="password-error">Password must be at least 8 characters.</span>
            </div>

            <label class="remember">
              <input type="checkbox" name="remember" />
              <span class="checkmark">
                <svg viewBox="0 0 12 10" aria-hidden="true"><path d="m1 5 3 3 7-7" /></svg>
              </span>
              Keep me signed in
            </label>

            <button class="submit-button" type="submit">
              <span>Sign in</span>
              <svg viewBox="0 0 20 20" aria-hidden="true"><path d="m7 4 6 6-6 6" /></svg>
            </button>

            <p class="form-status" role="status" aria-live="polite"></p>
          </form>

          <div class="register-area">
            <span>Don't have an account?</span>
            <a class="register-button" href="register.html">Register</a>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
