<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Edit your Unreleased.me profile." />
    <title>Edit Profile | Unreleased.me</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="site-page">
      <header class="site-header">
        <a class="site-logo" href="index.html" aria-label="Unreleased.me landing page">
          <img src="assets/unreleased-logo.png" alt="Unreleased.me" />
        </a>

        <nav class="site-tabs" aria-label="Main navigation">
          <a href="home.html">Home</a>
          <a href="search.html">Search</a>
          <a href="forum.html">Forum</a>
          <a href="wiki.html">Wiki</a>
          <a href="contact.html">Contact</a>
        </nav>

        <a class="account-link is-active" href="account.html">
          <span>Account</span>
          <span class="profile-placeholder" aria-hidden="true"></span>
        </a>
      </header>

      <div class="clock-row">
        <div class="clock-widget" aria-label="Current local time">
          <span class="analog-clock" aria-hidden="true">
            <span class="clock-hand clock-hand--hour"></span>
            <span class="clock-hand clock-hand--minute"></span>
            <span class="clock-hand clock-hand--second"></span>
            <span class="clock-center"></span>
          </span>
          <time class="digital-time" datetime="">--:--:--</time>
        </div>
      </div>

      <section class="edit-profile-page" aria-labelledby="edit-profile-title">
        <div class="account-heading">
          <p class="site-placeholder__label">Account settings</p>
          <h1 id="edit-profile-title">Edit profile</h1>
          <p>Update the profile information stored on this device.</p>
        </div>

        <form class="account-card" id="edit-profile-form" novalidate>
          <div class="edit-avatar-row">
            <img class="account-avatar" id="profile-preview" src="/api/profile-image" alt="Current profile picture" />
            <div>
              <strong>Profile picture</strong>
              <p>PNG, JPEG, GIF, or WebP. Maximum size: 2 MB.</p>
              <div class="profile-picture-actions">
                <label class="profile-upload-button" for="profile-picture">Choose image</label>
                <button class="profile-remove-button" id="remove-profile-picture" type="button">Use default</button>
              </div>
              <input
                class="profile-file-input"
                id="profile-picture"
                name="profilePicture"
                type="file"
                accept="image/png,image/jpeg,image/gif,image/webp"
              />
            </div>
          </div>

          <div class="field">
            <label for="edit-username">Username</label>
            <div class="input-wrap">
              <input id="edit-username" name="username" type="text" minlength="3" placeholder="Your username" required />
            </div>
            <span class="field-error" id="edit-username-error">Username must be at least 3 characters.</span>
          </div>

          <div class="field">
            <label for="edit-email">Email address</label>
            <div class="input-wrap">
              <input id="edit-email" name="email" type="email" placeholder="you@example.com" required />
            </div>
            <span class="field-error" id="edit-email-error">Enter a valid email address.</span>
          </div>

          <div class="field">
            <label for="edit-invite-code">Invite code used</label>
            <div class="input-wrap">
              <input id="edit-invite-code" type="text" readonly />
            </div>
          </div>

          <div class="edit-profile-actions">
            <button class="submit-button" type="submit">Save changes</button>
            <a class="account-action" href="account.html">Cancel</a>
          </div>
          <p class="form-status" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="site-clock.js"></script>
    <script src="edit-profile.js"></script>
  </body>
</html>
